<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Танцевальные таблицы → PNG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f3ef 0%, #e8e3da 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; color: #1a1a2e; }
  .card { background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); padding: 40px; max-width: 560px; width: 100%; overflow: visible; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 28px; }
  .drop { border: 2px dashed #c9c2b3; border-radius: 14px; padding: 48px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #faf8f4; display: block; }
  .drop:hover, .drop.dragover { border-color: #2b4c8c; background: #f0f4fc; }
  .drop p { color: #666; font-size: 14px; }
  .drop strong { color: #2b4c8c; }
  .filename { margin-top: 12px; font-size: 13px; color: #2b4c8c; font-weight: 600; word-break: break-all; text-align: center; display: none; }
  .filename.show { display: block; }
  input[type=file] { display: none; }
  .preview { margin-top: 20px; max-width: 100%; border-radius: 10px; display: none; }
  .preview.show { display: block; }
  .dance-selector { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .dance-btn { --dance-color: #2b4c8c; --dance-soft: #e8eef9; flex: 1; min-width: 110px; padding: 9px 12px; background: var(--dance-soft); color: var(--dance-color); border: 2px solid transparent; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 0; width: auto; text-align: center; }
  .dance-btn[data-dance="slow-waltz"] { --dance-color: #315fa8; --dance-soft: #e7eef9; }
  .dance-btn[data-dance="tango"] { --dance-color: #b4463d; --dance-soft: #fae9e7; }
  .dance-btn[data-dance="slow-fox"] { --dance-color: #34785a; --dance-soft: #e5f1eb; }
  .dance-btn[data-dance="viennese-waltz"] { --dance-color: #7953a6; --dance-soft: #f0eafa; }
  .dance-btn:hover { border-color: var(--dance-color); transform: translateY(-1px); }
  .dance-btn.active { background: var(--dance-color); color: #fff; border-color: var(--dance-color); box-shadow: 0 4px 12px rgba(43,76,140,0.18); }
  .dance-btn .num { display: inline-block; width: 18px; height: 18px; background: rgba(255,255,255,0.25); border-radius: 5px; font-size: 11px; line-height: 18px; text-align: center; margin-right: 5px; }
  .dance-btn:not(.active) .num { background: rgba(255,255,255,0.65); color: var(--dance-color); }
  button { margin-top: 20px; width: 100%; padding: 14px; background: #2b4c8c; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  button:hover:not(:disabled) { background: #1f3a6e; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { margin-top: 16px; font-size: 14px; text-align: center; min-height: 20px; }
  .status.error { color: #c0392b; }
  .status.success { color: #27ae60; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #c9c2b3; border-top-color: #2b4c8c; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .custom-title-wrap { margin-top: 16px; }
  .custom-title-wrap input { width: 100%; padding: 10px 14px; border: 2px solid #c9c2b3; border-radius: 10px; font-size: 14px; color: #1a1a2e; background: #faf8f4; outline: none; transition: border-color 0.2s; }
  .custom-title-wrap input:focus { border-color: #2b4c8c; }
  .custom-title-wrap input::placeholder { color: #aaa; }
</style>
</head>
<body>
  <div class="card">
    <h1>Танцевальные таблицы</h1>
    <p class="sub">Загрузите PNG с таблицей — получите красивую переведённую версию</p>

    <div class="dance-selector">
      <button type="button" class="dance-btn active" data-dance="slow-waltz"><span class="num">1</span>Slow Waltz</button>
      <button type="button" class="dance-btn" data-dance="tango"><span class="num">2</span>Tango</button>
      <button type="button" class="dance-btn" data-dance="slow-fox"><span class="num">3</span>Slow Fox</button>
      <button type="button" class="dance-btn" data-dance="viennese-waltz"><span class="num">4</span>Viennese Waltz</button>
    </div>

    <label for="file" class="drop" id="drop">
      <p><strong>Нажмите</strong> или перетащите PNG сюда</p>
    </label>
    <input type="file" id="file" accept="image/png,image/jpeg">
    <div id="filename" class="filename"></div>
    <img id="preview" class="preview" alt="preview">

    <div class="custom-title-wrap">
      <input type="text" id="customTitle" placeholder="Своё название фигуры (необязательно)">
    </div>

    <button id="submit" disabled>Преобразовать</button>
    <div class="status" id="status"></div>
  </div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const preview = document.getElementById('preview');
const filenameEl = document.getElementById('filename');
const submit = document.getElementById('submit');
const status = document.getElementById('status');
let currentFile = null;
let currentDance = 'slow-waltz';

document.querySelectorAll('.dance-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dance-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDance = btn.dataset.dance;
  });
});

['dragover', 'dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); }));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); }));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(f) {
  currentFile = f;
  filenameEl.textContent = f.name;
  filenameEl.classList.add('show');
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; preview.classList.add('show'); };
  reader.readAsDataURL(f);
  submit.disabled = false;
  status.textContent = '';
  status.className = 'status';
}

function makeOutputName(originalName) {
  const dot = originalName.lastIndexOf('.');
  const base = dot > 0 ? originalName.slice(0, dot) : originalName;
  return `${base}_RUS.png`;
}

submit.addEventListener('click', async () => {
  if (!currentFile) return;
  submit.disabled = true;
  status.innerHTML = '<span class="spinner"></span>Распознаём и рендерим...';
  status.className = 'status';
  try {
    const fd = new FormData();
    fd.append('image', currentFile);
    fd.append('danceType', currentDance);
    fd.append('customTitle', document.getElementById('customTitle').value.trim());
    const r = await fetch('/convert', { method: 'POST', body: fd });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'Ошибка ' + r.status }));
      throw new Error(err.error || 'Ошибка сервера');
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = makeOutputName(currentFile.name);
    a.click();
    URL.revokeObjectURL(url);
    status.textContent = 'Готово! Файл скачан.';
    status.className = 'status success';
  } catch (e) {
    status.textContent = 'Ошибка: ' + e.message;
    status.className = 'status error';
  } finally {
    submit.disabled = false;
  }
});
</script>
</body>
</html>
